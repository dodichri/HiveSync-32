; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_esp32s3_reversetft]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries for the built-in ST7789 TFT and GFX
lib_deps =
  adafruit/Adafruit ST7735 and ST7789 Library
  adafruit/Adafruit GFX Library
  adafruit/Adafruit MAX1704X
  paulstoffregen/OneWire
  milesburton/DallasTemperature
  bogde/HX711

; Auto-generate exact Font Awesome WiFi glyph bitmap before build
extra_scripts =
  pre:scripts/gen_fa_wifi_bitmap.py

; Optional: define sensor pins and sleep interval here
; Uncomment and set pins to match your wiring
;build_flags =
;  -DDS18B20_PIN=10           ; DS18B20 OneWire pin (set correctly)
;  -DHX711_DOUT_PIN=12        ; HX711 DOUT pin
;  -DHX711_SCK_PIN=11         ; HX711 SCK pin
;  -DHX711_CALIBRATION=2280.0 ; calibration factor (units per raw division)
;  -DSLEEP_MINUTES=15         ; deep sleep interval
;  -DENABLE_WIFI_PROVISIONING=0 ; set 1 to enable BLE Wi-Fi provisioning
