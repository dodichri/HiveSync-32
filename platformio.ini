; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_esp32s3_reversetft]
platform = espressif32
board = adafruit_feather_esp32s3_reversetft
framework = arduino

; Serial monitor
monitor_speed = 115200

; Libraries for the built-in ST7789 TFT and GFX
lib_deps =
  adafruit/Adafruit ST7735 and ST7789 Library
  adafruit/Adafruit GFX Library
  adafruit/Adafruit MAX1704X

; Auto-generate exact Font Awesome WiFi glyph bitmap before build
extra_scripts =
  pre:scripts/gen_fa_wifi_bitmap.py

; Firmware version and GitHub repo for update checks
; NOTE: Set these to match your repo. Example:
;   -D FW_VERSION=\"0.1.0\"
;   -D GITHUB_OWNER=\"your-org-or-user\"
;   -D GITHUB_REPO=\"your-firmware-repo\"
; Optionally override check interval (milliseconds); default is 24h
;   -D GITHUB_CHECK_INTERVAL_MS=86400000
build_flags =
  -D FW_VERSION=\"0.1.0\"
  -D GITHUB_OWNER=\"dodichri\"   ; set to your GitHub user/org
  -D GITHUB_REPO=\"HiveSync-32\"   ; set to your repository name

; Use a larger single-app partition while keeping TinyUF2
board_build.partitions = partitions-tinyuf2-noota.csv
